server {
    listen 80;
    server_name rf-open-llm.ru www.rf-open-llm.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name rf-open-llm.ru www.rf-open-llm.ru;

    ssl_certificate /etc/letsencrypt/live/rf-open-llm.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rf-open-llm.ru/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # API — напрямую на бэкенд (минуя front-контейнер, чтобы X-Forwarded-Proto: https дошёл до Spring)
    location /billing-manager/ {
        proxy_pass http://127.0.0.1:8080/billing-manager/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE для стриминга чата
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        add_header X-Accel-Buffering no;
    }

    # Фронтенд
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
