server:
  port: 8080
  servlet:
    context-path: /${spring.application.name}

spring:
  application:
    name: billing-manager
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:billing_manager}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    hikari:
      schema: billing_manager
      connection-init-sql: CREATE SCHEMA IF NOT EXISTS ${spring.datasource.hikari.schema};
  liquibase:
    change-log: ./db/changelog/changelog-master.yml
    contexts: "postgres"
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: openid, email, profile
        provider:
          google:
            issuer-uri: https://accounts.google.com
      resourceserver:
        jwt:
          issuer-uri: https://accounts.google.com

billing-manager:
  jwt:
    secret-key: ${JWT_SECRET_KEY}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:1440}
  frontend-redirect-url: ${FRONTEND_REDIRECT_URL:http://localhost:3000/auth/callback}
  integration:
    default-timeout-ms: ${INTEGRATION_DEFAULT_TIMEOUT_MS:10000}
    lite-llm:
      host: ${LITELLM_BASE_URL:http://localhost:4000}
      master-key: ${LITELLM_MASTER_KEY}
      callback-secret: ${LITELLM_CALLBACK_SECRET}
  yookassa:
    shop-id: ${YOOKASSA_SHOP_ID}
    secret-key: ${YOOKASSA_SECRET_KEY}
    return-url: ${YOOKASSA_RETURN_URL:http://localhost:3000/payment/return}
    api-url: ${YOOKASSA_API_URL:https://api.yookassa.ru/v3}
  scheduler:
    subscription-expiration-job:
      cron: ${SUBSCRIPTION_EXPIRATION_CRON:0 0 3 * * *}
  subscription:
    grace-period-days: ${SUBSCRIPTION_GRACE_PERIOD_DAYS:3}
    period-days: ${SUBSCRIPTION_PERIOD_DAYS:30}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  chat:
    max-history-messages: ${CHAT_MAX_HISTORY_MESSAGES:20}
    reserve-tokens: ${CHAT_RESERVE_TOKENS:1024}
    sse-timeout-ms: ${CHAT_SSE_TIMEOUT_MS:120000}
    idempotency-ttl-minutes: ${CHAT_IDEMPOTENCY_TTL_MINUTES:60}
    title-generation-model: ${CHAT_TITLE_MODEL:deepseek/deepseek-chat}

logbook:
  filter:
    enabled: true
  format:
    style: json
  obfuscate:
    headers:
      - Authorization
      - X-Api-Key
    parameters:
      - access_token
