databaseChangeLog:
  - changeSet:
      id: "06.create_payment.yml"
      author: "Panyukov NN"
      changes:
        - createTable:
            tableName: payment
            remarks: "Платежи пользователей"
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
              - column:
                  name: app_user_id
                  type: UUID
                  remarks: "Идентификатор пользователя"
              - column:
                  name: subscription_plan_id
                  type: UUID
                  remarks: "Идентификатор тарифного плана"
              - column:
                  name: yookassa_payment_id
                  type: varchar
                  remarks: "Идентификатор платежа в ЮKassa"
              - column:
                  name: amount_kopecks
                  type: bigint
                  remarks: "Сумма платежа в копейках"
              - column:
                  name: status
                  type: varchar
                  remarks: "Статус платежа"
              - column:
                  name: create_time
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
                  remarks: "Время создания"
              - column:
                  name: create_user
                  type: varchar
                  constraints:
                    nullable: false
                  remarks: "Пользователь, создавший запись"
              - column:
                  name: last_update_time
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
                  remarks: "Время обновления"
              - column:
                  name: last_update_user
                  type: varchar
                  constraints:
                    nullable: false
                  remarks: "Пользователь, изменивший запись"
