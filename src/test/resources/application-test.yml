spring:
  datasource:
    url: jdbc:h2:mem:billing_manager_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-client-id
            client-secret: test-client-secret
      resourceserver:
        jwt:
          issuer-uri: https://accounts.google.com

app:
  litellm:
    base-url: http://localhost:4000
    master-key: test-master-key
  yookassa:
    shop-id: test-shop-id
    secret-key: test-secret-key
    return-url: http://localhost:3000/payment/return
  subscription:
    grace-period-days: 3

logbook:
  filter:
    enabled: false
